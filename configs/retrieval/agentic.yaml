name: agentic

top_k: 5

# which Claude model drives the tool-use loop

model: claude-sonnet-4-6

# loop bounds

max_tool_calls: 4

max_tokens_per_turn: 1024

# tool behavior

search_top_k: 5

neighbor_window: 1

tool_result_preview_chars: 600

use_dense_tool: true

use_rerank_tool: true

# context management (prompt caching + trimming)

keep_recent_tool_turns: 5

# diagnostics

verbose: false
